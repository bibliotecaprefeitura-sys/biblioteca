<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treinamentos | Biblioteca PUSP-SC</title>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
<div class="page-wrap">

  <a href="index.html" class="back-btn">
    <i class="ti ti-arrow-left" aria-hidden="true"></i> Voltar
  </a>

  <header class="header">
    <div class="logo-wrap">
      <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="8" y="6" width="32" height="36" rx="3"/>
        <path d="M15 14h18M15 20h18M15 26h12"/>
        <path d="M24 32v6M20 38h8"/>
      </svg>
    </div>
    <p class="inst-label">Biblioteca PUSP-SC</p>
    <h1 class="page-title">📚 Treinamentos</h1>
    <p class="page-subtitle">Webinars e capacitações</p>
    <div class="accent-line"></div>
  </header>

  <div class="links" id="items-list"></div>

  <button class="admin-toggle" onclick="toggleAdmin()">⚙️ Área administrativa</button>

  <div class="admin-panel" id="admin-panel">
    <div id="pw-screen" class="pw-screen">
      <p>Digite a senha para acessar o painel de edição</p>
      <input type="password" class="pw-input" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter') checkPw()">
      <br>
      <button class="pw-btn" onclick="checkPw()">Entrar</button>
      <p class="pw-error" id="pw-error">Senha incorreta.</p>
    </div>
    <div id="edit-screen" style="display:none">
      <div class="admin-title"><i class="ti ti-edit" aria-hidden="true"></i> Editar Treinamentos</div>
      <div id="edit-items"></div>
      <button class="add-btn" onclick="addItem()">+ Adicionar treinamento</button>
      <button class="save-btn" onclick="saveItems()">Salvar alterações</button>
      <p class="save-msg" id="save-msg">✓ Salvo com sucesso!</p>
    </div>
  </div>

  <footer class="footer" style="margin-top:2rem">
    Biblioteca da PUSP-SC · Universidade de São Paulo · São Carlos
  </footer>

</div>

<script>
const STORAGE_KEY = 'bib_treinamentos';
const PAGE_PW = 'biblioteca2024';

const ICON_COLORS = ['ci-blue','ci-green','ci-teal','ci-gold','ci-coral','ci-purple'];
const ICONS = ['ti-player-play','ti-file-text','ti-search','ti-database','ti-chart-bar','ti-bookmark'];

const DEFAULT_ITEMS = [
  {
    title: 'Webinar: Como transformar a pesquisa científica em inovação',
    desc: 'Estratégias para otimizar o processamento de patentes no Brasil e unir financiamento e pesquisa em prol de impacto real.',
    url: 'https://webinars.elsevier.com/elsevier/como-transformar-a-pesquisa-cientifica-em-inovacao-concreta-e-impacto-real-para-a-sociedade?lid=24dgju9x5376&utm_source=braze&utm_medium=email&utm_campaign=RL_FD_EM_11573380842&utm_content=2e9f9b3f-bf3c-4868-9dbe-1711f5591bb5&utm_term=1139442d-126a-4ae2-abb5-663e77daf9e4_RM_RL_FD_EM_11573380842_20260518_EV_WebinarPatentBRPTEM2EML1_11966177278_EML_AG'
  },
  {
    title: 'Webinar JoVE & USP: Como criar aulas engajantes com vídeos?',
    desc: 'A JoVE é uma plataforma de vídeos para pesquisa e ensino que vai muito além do conceito tradicional de periódico científico.',
    url: 'https://us06web.zoom.us/meeting/register/nKcCSvigRsq_0ioFzd7xvQ#/registration'
  },
  {
    title: 'Webex: Derwent Innovations Index & Zoological Records',
    desc: 'Conheça recursos específicos da Plataforma Web of Science: DII para inovação e Zoological Records para taxonomia e zoologia.',
    url: 'https://clarivatesupport.webex.com/webappng/sites/clarivatesupport/meeting/register/bd9f700e70504c00ad64e80e26ab4450'
  }
];

function loadItems() {
  const saved = localStorage.getItem(STORAGE_KEY);
  return saved ? JSON.parse(saved) : DEFAULT_ITEMS;
}

function renderList() {
  const items = loadItems();
  const list = document.getElementById('items-list');
  if (items.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:var(--text-muted);font-size:14px;padding:2rem 0">Nenhum treinamento disponível no momento.</p>';
    return;
  }
  list.innerHTML = items.map((item, i) => `
    <a href="${item.url}" class="link-card${i===0?' featured':''}" target="_blank" rel="noopener">
      <div class="card-icon ${ICON_COLORS[i % ICON_COLORS.length]}">
        <i class="ti ${ICONS[i % ICONS.length]}" aria-hidden="true"></i>
      </div>
      <div class="card-body">
        <div class="card-title">${item.title}</div>
        <div class="card-desc">${item.desc}</div>
      </div>
      <i class="ti ti-arrow-right card-arrow" aria-hidden="true"></i>
    </a>
  `).join('');
}

function toggleAdmin() {
  const panel = document.getElementById('admin-panel');
  panel.classList.toggle('open');
}

function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === PAGE_PW) {
    document.getElementById('pw-screen').style.display = 'none';
    document.getElementById('edit-screen').style.display = 'block';
    renderEditItems();
  } else {
    document.getElementById('pw-error').style.display = 'block';
  }
}

function renderEditItems() {
  const items = loadItems();
  const container = document.getElementById('edit-items');
  container.innerHTML = items.map((item, i) => `
    <div class="admin-item" id="edit-item-${i}">
      <div class="admin-item-header">
        <span class="admin-item-num">Treinamento ${i+1}</span>
        <button class="del-btn" onclick="removeItem(${i})" title="Remover"><i class="ti ti-trash"></i></button>
      </div>
      <label class="admin-label">Título</label>
      <input class="admin-input" id="t-title-${i}" value="${escHtml(item.title)}">
      <label class="admin-label">Descrição</label>
      <textarea class="admin-textarea" id="t-desc-${i}">${escHtml(item.desc)}</textarea>
      <label class="admin-label">Link (URL)</label>
      <input class="admin-input" id="t-url-${i}" value="${escHtml(item.url)}">
    </div>
  `).join('');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addItem() {
  const items = loadItems();
  items.push({ title: 'Novo treinamento', desc: 'Descrição breve do treinamento', url: 'https://' });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  renderEditItems();
}

function removeItem(i) {
  const items = loadItems();
  items.splice(i, 1);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  renderEditItems();
  renderList();
}

function saveItems() {
  const items = loadItems();
  const saved = items.map((_, i) => ({
    title: document.getElementById(`t-title-${i}`).value,
    desc: document.getElementById(`t-desc-${i}`).value,
    url: document.getElementById(`t-url-${i}`).value
  }));
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  renderList();
  const msg = document.getElementById('save-msg');
  msg.style.display = 'block';
  setTimeout(() => msg.style.display = 'none', 3000);
}

renderList();
</script>
</body>
</html>
