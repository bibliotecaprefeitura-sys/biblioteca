<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dica de Leitura | Biblioteca PUSP-SC</title>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
<div class="page-wrap">

  <a href="index.html" class="back-btn">
    <i class="ti ti-arrow-left" aria-hidden="true"></i> Voltar
  </a>

  <header class="header">
    <div class="logo-wrap" style="width:80px;height:80px;border:none;background:transparent;overflow:hidden;">
      <img src="logo_puspsc.jpg" alt="Logo Biblioteca PUSP-SC" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid #1E5FA3;">
    </div>
    <p class="inst-label">Biblioteca PUSP-SC</p>
    <h1 class="page-title">📖 Dica de Leitura</h1>
    <p class="page-subtitle">Sugestões da nossa equipe</p>
    <div class="accent-line"></div>
  </header>

  <div class="links" id="items-list"></div>

  <button class="admin-toggle" onclick="toggleAdmin()">⚙️ Área administrativa</button>

  <div class="admin-panel" id="admin-panel">
    <div id="pw-screen" class="pw-screen">
      <p>Digite a senha para acessar o painel de edição</p>
      <input type="password" class="pw-input" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter') checkPw()">
      <br>
      <button class="pw-btn" onclick="checkPw()">Entrar</button>
      <p class="pw-error" id="pw-error">Senha incorreta.</p>
    </div>
    <div id="edit-screen" style="display:none">
      <div class="admin-title"><i class="ti ti-edit" aria-hidden="true"></i> Editar Dicas de Leitura</div>
      <div id="edit-items"></div>
      <button class="add-btn" onclick="addItem()">+ Adicionar dica</button>
      <button class="save-btn" onclick="saveItems()">Salvar alterações</button>
      <p class="save-msg" id="save-msg">✓ Salvo com sucesso!</p>
    </div>
  </div>

  <footer class="footer" style="margin-top:2rem">
    Biblioteca da PUSP-SC · Universidade de São Paulo · São Carlos
  </footer>

</div>
<script>
<script>
const SHEET_ID = '1DMFrXCLhj_OoFkSRFQXv2yPt2VOsgonZjiszIRFYK24';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

const ICON_COLORS = ['ci-blue','ci-green','ci-teal','ci-gold','ci-coral','ci-purple'];
const ICONS = ['ti-bookmark','ti-file-text','ti-book','ti-notebook','ti-align-left'];

const CATEGORIA_PAGINA = 'dicaleitura'; 

function parseCSV(text) {
  let lines = [];
  let row = [""];
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    let c = text[i];
    let next = text[i+1];
    if (c === '"') {
      if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; }
      else { inQuotes = !inQuotes; }
    } else if (c === ',' && !inQuotes) {
      row.push('');
    } else if ((c === '\r' || c === '\n') && !inQuotes) {
      if (c === '\r' && next === '\n') { i++; }
      lines.push(row);
      row = [''];
    } else {
      row[row.length - 1] += c;
    }
  }
  if (row.length > 1 || row[0] !== '') lines.push(row);
  return lines;
}

async function renderList() {
  const list = document.getElementById('items-list');
  if (!list) return;

  try {
    const resposta = await fetch(SHEET_URL);
    const texto = await resposta.text();
    const linhas = parseCSV(texto);

    let htmlFinal = '';
    let contadorItem = 0;

    for (let i = 1; i < linhas.length; i++) {
      const cols = linhas[i];
      if (cols.length < 5) continue;

      const categoriaPlanilha = cols[0] ? cols[0].toLowerCase().trim() : '';
      const titulo = cols[1] || '';
      const autor = cols[2] || '';
      const descricao = cols[3] || '';
      const url = cols[4] || '';

      if (categoriaPlanilha === CATEGORIA_PAGINA) {
        const corIcone = ICON_COLORS[contadorItem % ICON_COLORS.length];
        const classeIcone = ICONS[contadorItem % ICONS.length];
        const classeDestaque = contadorItem === 0 ? ' featured' : '';

        htmlFinal += `
          <a href="${url.trim()}" class="link-card${classeDestaque}" target="_blank" rel="noopener">
            <div class="card-icon ${corIcone}">
              <i class="ti ${classeIcone}" aria-hidden="true"></i>
            </div>
            <div class="card-body">
              <div class="card-title">${titulo}</div>
              <div class="card-author" style="font-size:12px; color:var(--text-muted); margin-bottom:4px;">
                <i class="ti ti-user" style="font-size:14px; vertical-align:middle;"></i> ${autor}
              </div>
              <div class="card-desc">${descricao}</div>
            </div>
            <i class="ti ti-arrow-right card-arrow" aria-hidden="true"></i>
          </a>
        `;
        contadorItem++;
      }
    }

    if (contadorItem > 0) {
      list.innerHTML = htmlFinal;
    } else {
      list.innerHTML = '<p style="text-align:center;color:var(--text-muted);font-size:14px;padding:2rem 0">Nenhuma dica de leitura disponível no momento.</p>';
    }

  } catch (erro) {
    console.error("Erro ao puxar dados da planilha:", erro);
    list.innerHTML = '<p style="text-align:center;color:var(--text-muted);font-size:14px;padding:2rem 0">Erro ao carregar os dados em tempo real.</p>';
  }
}

document.addEventListener('DOMContentLoaded', renderList);
</script>
</body>
</html>
