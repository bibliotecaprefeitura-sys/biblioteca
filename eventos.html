<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eventos | Biblioteca PUSP-SC</title>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
<div class="page-wrap">

  <a href="index.html" class="back-btn">
    <i class="ti ti-arrow-left" aria-hidden="true"></i> Voltar
  </a>

  <header class="header">
    <div class="logo-wrap" style="width:80px;height:80px;border:none;background:transparent;overflow:hidden;">
      <img src="logo_puspsc.jpg" alt="Logo Biblioteca PUSP-SC" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid #1E5FA3;">
    </div>
    <p class="inst-label">Biblioteca PUSP-SC</p>
    <h1 class="page-title">🗓️ Eventos</h1>
    <p class="page-subtitle">Programação cultural e eventos</p>
    <div class="accent-line"></div>
  </header>

  <div class="links" id="items-list"></div>

  <footer class="footer" style="margin-top:2rem">
    Biblioteca da PUSP-SC · Universidade de São Paulo · São Carlos
  </footer>

</div>
<script>
const SHEET_ID = '1DMFrXCLhj_OoFkSRFQXv2yPt2VOsgonZjiszIRFYK24';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

const ICON_COLORS = ['ci-coral','ci-purple','ci-gold','ci-blue'];
const ICONS = ['ti-calendar','ti-map-pin','ti-users','ti-microphone'];

const CATEGORIA_PAGINA = 'eventos'; 

function parseCSV(text) {
  let lines = []; let row = [""]; let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    let c = text[i]; let next = text[i+1];
    if (c === '"') { if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; } else { inQuotes = !inQuotes; } }
    else if (c === ',' && !inQuotes) { row.push(''); }
    else if ((c === '\r' || c === '\n') && !inQuotes) { if (c === '\r' && next === '\n') { i++; } lines.push(row); row = ['']; }
    else { row[row.length - 1] += c; }
  }
  if (row.length > 1 || row[0] !== '') lines.push(row); return lines;
}

async function renderList() {
  const list = document.getElementById('items-list');
  if (!list) return;
  try {
    const resposta = await fetch(SHEET_URL);
    const texto = await resposta.text();
    const linhas = parseCSV(texto);
    let htmlFinal = ''; let contadorItem = 0;

    for (let i = 1; i < linhas.length; i++) {
      const cols = linhas[i]; if (cols.length < 5) continue;
      const categoriaPlanilha = cols[0] ? cols[0].toLowerCase().trim() : '';
      const titulo = cols[1] || ''; const descricao = cols[3] || ''; const url = cols[4] || '';

      if (categoriaPlanilha === CATEGORIA_PAGINA) {
        const corIcone = ICON_COLORS[contadorItem % ICON_COLORS.length];
        const classeIcone = ICONS[contadorItem % ICONS.length];
        const classeDestaque = contadorItem === 0 ? ' featured' : '';

        htmlFinal += `
          <a href="${url.trim()}" class="link-card${classeDestaque}" target="_blank" rel="noopener">
            <div class="card-icon ${corIcone}">
              <i class="ti ${classeIcone}" aria-hidden="true"></i>
            </div>
            <div class="card-body">
              <div class="card-title">${titulo}</div>
              <div class="card-desc">${descricao}</div>
            </div>
            <i class="ti ti-arrow-right card-arrow" aria-hidden="true"></i>
          </a>
        `;
        contadorItem++;
      }
    }
    list.innerHTML = contadorItem > 0 ? htmlFinal : '<p style="text-align:center;color:var(--text-muted);font-size:14px;padding:2rem 0">Nenhum evento agendado no momento.</p>';
  } catch (erro) {
    list.innerHTML = '<p style="text-align:center;color:var(--text-muted);font-size:14px;padding:2rem 0">Erro ao carregar os dados em tempo real.</p>';
  }
}
document.addEventListener('DOMContentLoaded', renderList);
</script>
</body>
</html>
